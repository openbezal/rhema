name: Deploy landing site

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing-deploy.yml"
  workflow_dispatch:

# Grant the GITHUB_TOKEN the perms needed to push to gh-pages.
permissions:
  contents: write

concurrency:
  group: landing-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Quality gates — deploy never runs if any of these fail.
      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing/dist
          publish_branch: gh-pages
          commit_message: "deploy: landing site from ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
