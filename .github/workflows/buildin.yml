name: Build Veeba Installers

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ✅ Force MSVC toolchain (prevents runtime mismatch)
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ❌ Removed rust-cache (causes LNK1319)

      - name: Install dependencies
        run: bun install

      - name: Fix build script
        run: |
          $content = Get-Content package.json -Raw
          $content = $content -replace '"build": "tsc -b && vite build"', '"build": "vite build"'
          Set-Content package.json $content

      - name: Install cmake
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Download Bible data
        run: bun run download:bible-data

      - name: Build Bible database
        run: bun run build:bible

      # ✅ Clean to remove mismatched artifacts
      - name: Clean Rust build
        run: cargo clean
        working-directory: src-tauri

      # ✅ Ensure dependencies are aligned
      - name: Update Rust dependencies
        run: cargo update
        working-directory: src-tauri

      # ✅ Build Tauri app
      - name: Build app
        run: bun run tauri build
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: veeba-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
